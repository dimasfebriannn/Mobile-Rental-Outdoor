name: majelis_adventure
description: "A premium outdoor rental app for Majelis Adventure."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0 

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2 
  url_launcher: ^6.2.5
  provider: ^6.1.5+1
  shared_preferences: ^2.3.5 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 
  image_picker: ^1.1.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/img/majelis.png" 
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - lib/assets/img/majelis.png